name: test

on:
  push:
    branches: [main]
  pull_request:

env:
  # -dPDFX=4 arrived in Ghostscript 10.05.0. Ubuntu 24.04's apt ships 10.02.1, where
  # PDFX is a boolean: -dPDFX=4 dies with "/typecheck in --pdfmark--", and a plain CMYK
  # conversion leaves /Group << /CS /DeviceRGB >> behind. So we build the version the
  # product actually supports rather than testing against one it refuses to use.
  GS_VERSION: 10.07.1
  GS_TAG: gs10071

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      # Ubuntu 24.04 restricts unprivileged user namespaces via AppArmor, which is
      # exactly what Chromium's sandbox needs. Without this, every puppeteer.launch()
      # in the suite dies before it opens a page. Relaxing it here beats threading
      # --no-sandbox through five launch sites.
      - run: sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0

      - name: cache Ghostscript ${{ env.GS_VERSION }}
        id: gs-cache
        uses: actions/cache@v4
        with:
          path: ~/gs
          key: ghostscript-${{ env.GS_VERSION }}-${{ runner.os }}

      - name: build Ghostscript ${{ env.GS_VERSION }}
        if: steps.gs-cache.outputs.cache-hit != 'true'
        # In $RUNNER_TEMP, not the checkout: the tarball and its source tree would
        # otherwise sit in the working directory and fail the "must not dirty" step.
        working-directory: ${{ runner.temp }}
        run: |
          set -euo pipefail
          curl -fsSL -o gs.tar.xz \
            "https://github.com/ArtifexSoftware/ghostpdl-downloads/releases/download/${GS_TAG}/ghostscript-${GS_VERSION}.tar.xz"
          tar xf gs.tar.xz
          cd "ghostscript-${GS_VERSION}"
          ./configure --prefix="$HOME/gs" --without-x --disable-cups --disable-gtk --without-tesseract
          make -j"$(nproc)"
          make install
          # The output intent needs an ICC file on disk. Ghostscript's own generic CMYK
          # profile exercises the whole PDF/X-4 path — intent embedded, identification
          # written, text still vector — and proves the plumbing. It is NOT a press
          # characterization; a real job wants GRACoL2013 or SWOP, which we may not
          # redistribute. See assets/icc/README.md.
          cp -r iccprofiles "$HOME/gs/iccprofiles"

      - name: point the suite at it
        run: |
          set -euo pipefail
          gs="$HOME/gs/bin/gs"
          test -x "$gs"
          "$gs" --version
          icc=$(find "$HOME/gs" -name 'default_cmyk.icc' -print -quit)
          test -n "$icc"
          echo "HIG_GS=$gs" >> "$GITHUB_ENV"
          echo "HIG_ICC_PROFILE=$icc" >> "$GITHUB_ENV"

      # Puppeteer downloads its own Chromium on install. Fonts are committed.
      - run: npm ci

      # The suite renders into a temp dir (HIG_OUTPUTS_ROOT), so it leaves the tree clean.
      # *.log is gitignored, so tee-ing here does not dirty it either.
      - name: npm test
        run: |
          set -o pipefail
          npm test 2>&1 | tee test.log

      # A green presstest that skipped is indistinguishable from a green presstest that
      # ran. Name the assertions that only exist on the conversion path, and demand them.
      - name: presstest must have exercised the conversion path, not skipped it
        run: |
          set -e
          grep -qF 'presstest: Ghostscript present — conversion path EXERCISED.' test.log
          grep -qF 'PASS  cmyk: the text is unchanged — Ghostscript did not rasterize the page' test.log
          grep -qF 'PASS  cmyk: every font is still embedded and subsetted' test.log
          grep -qF 'PASS  cmyk: no object in the file still declares an RGB colour space' test.log
          grep -qF 'PASS  pdfx: the catalog carries /OutputIntents with subtype /GTS_PDFX' test.log
          grep -qF 'PASS  pdfx: the XMP carries the pdfxid identification PDF/X-4 conformance requires' test.log
          grep -qF 'PASS  pdfx: all four fonts are STILL embedded and subsetted' test.log
          grep -qF 'PASS  cmyk job: the PDF deliverable IS the converted file, converted in place' test.log
          ! grep -qF 'conversion path SKIPPED' test.log

      - name: the tests must not dirty the working tree
        run: git diff --exit-code && test -z "$(git status --porcelain)"
